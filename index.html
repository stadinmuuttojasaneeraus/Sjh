<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alltiallo Företag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="images/logo.png" alt="Alltiallo Företag">
      </div>
      <button class="menu-toggle">☰</button>
      <nav class="main-menu">
        <ul>
          <li><a href="#tjanster">Tjänster</a></li>
          <li><a href="#erbjudanden">Erbjudanden</a></li>
          <li><a href="#kontakt">Kontakt</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <img src="images/hero.jpg" alt="Företaget i arbete">
    <div class="hero-overlay">
      <h1>Alltiallo Företag</h1>
      <p>Renovering, Flytt, Städ, Sanering, Pihatyöt, Installation</p>
    </div>
  </section>

  <!-- Google Maps -->
  <section id="kartta">
    <h2>Vår plats</h2>
    <div id="map"></div>
  </section>

  <!-- Kontaktformulär -->
  <section id="kontakt">
  <h2>Kontakt</h2>
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <input type="text" name="name" placeholder="Ditt namn" required>
    <input type="email" name="email" placeholder="Din e-post" required>
    <textarea name="message" placeholder="Meddelande" required></textarea>
    <button type="submit">Skicka</button>
  </form>
  <div class="form-status" id="form-status"></div>
  </section>

  <script src="scripts/meny.js"></script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=DIN_API_NYCKEL&callback=initMap"></script>
  <script src="scripts/map.js"></script>
</body>
</html>
